<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thienshop - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Gill Sans', Calibri, 'Trebuchet MS', sans-serif;
            background-image: url('https://images.pexels.com/photos/31266794/pexels-photo-31266794.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: stretch;
        }

        .panel {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px;
        }

        .logo   { font-size: 28px; font-weight: 700; color: royalblue; margin-bottom: 8px; }
        .tagline{ font-size: 16px; color: #888; margin-bottom: 32px; }
        .title  { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            height: 48px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: royalblue;
            box-shadow: 0 0 0 3px rgba(65,105,225,0.12);
        }

        .btn-signup {
            width: 100%;
            height: 50px;
            background: royalblue;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-signup:hover  { background: #2a52d6; }
        .btn-signup:active { transform: scale(0.98); }

        .error-text { color: #e53e3e; font-size: 13px; margin-top: 8px; min-height: 18px; }

        .footer { margin-top: 28px; text-align: center; font-size: 14px; color: #666; }
        .footer a { color: royalblue; font-weight: 600; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body { background: #fff; }
            .panel { max-width: 100%; padding: 40px 24px; }
        }
        @media (max-width: 400px) {
            .panel { padding: 32px 16px; }
            .title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="logo">🛍️ thienshop</div>
        <div class="tagline">Let's go shopping! 🛒</div>
        <div class="title">Sign up to Thienshop</div>

        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter your username">
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input id="email" type="email" placeholder="account@gmail.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password">
        </div>

        <button class="btn-signup" onclick="SignUp()">SIGN UP</button>
        <div class="error-text" id="error_info_text"></div>

        <div class="footer">
            Already have an account? <a href="signin.html">Sign In</a>
        </div>
    </div>

    <script src="account.js"></script>
</body>
</html>
