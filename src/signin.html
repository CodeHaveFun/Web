<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thienshop - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Gill Sans', Calibri, 'Trebuchet MS', sans-serif;
            background-image: url('https://media.thuonghieucongluan.vn/uploads/2020/04/13/thay-vi-mua-sam-truc-tiep-nguoi-nguoi-dua-nhau-mua-sam-truc-tuyen-m-2020-02-11-141354-1586739049.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: stretch;
        }

        /* === PANEL TRÁI === */
        .panel {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 48px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: royalblue;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 16px;
            color: #888;
            margin-bottom: 32px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 32px;
        }

        /* === FORM === */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            height: 48px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: royalblue;
            box-shadow: 0 0 0 3px rgba(65,105,225,0.12);
        }

        .forgot {
            display: block;
            text-align: right;
            font-size: 13px;
            color: royalblue;
            text-decoration: none;
            margin-top: -12px;
            margin-bottom: 24px;
        }
        .forgot:hover { text-decoration: underline; }

        .btn-signin {
            width: 100%;
            height: 50px;
            background: royalblue;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }
        .btn-signin:hover  { background: #2a52d6; }
        .btn-signin:active { transform: scale(0.98); }

        .error-text {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 8px;
            min-height: 18px;
        }

        .divider {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin: 20px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #eee;
        }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .btn-guest {
            width: 100%;
            height: 46px;
            background: transparent;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .btn-guest:hover { border-color: royalblue; color: royalblue; background: #f0f4ff; }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        .footer a {
            color: royalblue;
            font-weight: 600;
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            body { background: #fff; }

            .panel {
                max-width: 100%;
                padding: 40px 24px;
                min-height: 100vh;
            }
        }

        @media (max-width: 400px) {
            .panel { padding: 32px 16px; }
            .title  { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="logo">🛍️ thienshop</div>
        <div class="tagline">What's new today?</div>
        <div class="title">Sign in to Thienshop</div>

        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter your username">
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input id="email" type="email" placeholder="account@gmail.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password">
        </div>

        <a href="#" class="forgot">Forgot your password?</a>

        <button class="btn-signin" onclick="SignIn()">SIGN IN</button>
        <div class="error-text" id="error_info_text"></div>

        <div class="divider">or</div>

        <button class="btn-guest" onclick="ModeGuestLoginIn()">👤 Sign in with guest mode</button>

        <div class="footer">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <script src="account.js"></script>
</body>
</html>
