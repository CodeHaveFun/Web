<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="custome_acc.css">
    <title>Thienshop - Account</title>
</head>
<body>

<div class="header">
    <label class="logo_header">🛍️ thienshop</label>
    <span class="header_divider"></span>
    <span class="header_title">Account</span>
</div>

<div class="acc_layout">
    <!-- Sidebar -->
    <aside class="option_menu">
        <button class="elem_option" id="id_profile">👤 Profile</button>
        <button class="elem_option" id="id_privacy">🔒 Privacy & Security</button>
        <button class="elem_option" id="id_feedback">💬 Feedback</button>
        <button class="elem_option" id="id_logout">🔴 Log out</button>
        <button class="elem_option" id="id_del_acc">🗑️ Delete account</button>
        <div class="menu_divider"></div>
        <button class="elem_option" onclick="window.location.href='home.html'">← Go back</button>
    </aside>

    <!-- Content -->
    <main class="change_box_all" id="table_contain">

        <!-- PROFILE -->
        <div id="id_tag_profile">
            <h2 class="section_title">Profile</h2>
            <div class="section_divider"></div>
            <div class="form_grid">
                <div class="field_group">
                    <label for="full_name_user">Full name</label>
                    <input type="text" class="input_elem" placeholder="Ex: Michel Robert" id="full_name_user">
                </div>
                <div class="field_group">
                    <label for="username">Username</label>
                    <input type="text" class="input_elem" placeholder="Username" id="username">
                </div>
                <div class="field_group">
                    <label for="email">E-mail</label>
                    <input type="text" class="input_elem" placeholder="E-mail" id="email">
                </div>
                <div class="field_group">
                    <label for="phone">Phone number</label>
                    <input type="number" class="input_elem" placeholder="09XXXXXXXX" id="phone">
                </div>
                <div class="field_group">
                    <label for="date">Date of birth</label>
                    <input type="date" class="input_elem" id="date">
                </div>
            </div>
            <div class="save_row">
                <button type="submit" id="profile_save" class="button_save">💾 Save</button>
                <p class="note_warn">⚠️ Saving profile will auto <b>log you out</b> — you'll need to sign in again.</p>
            </div>
        </div>

        <!-- PRIVACY & SECURITY -->
        <div id="id_tag_privacy">
            <h2 class="section_title">Privacy & Security</h2>
            <div class="section_divider"></div>

            <div class="accordion_item">
                <div class="accordion_header">
                    <span id="navi_pass">▶</span>
                    <button class="button_elem_2" id="button_pass_change">Change your password</button>
                </div>
                <div class="contain" id="contain_pass">
                    <div class="field_group">
                        <label for="old_pass">Current password</label>
                        <input type="password" id="old_pass" class="elem_change_pass" placeholder="Your current password">
                        <span class="warn_inline" id="warning_note"></span>
                    </div>
                    <div class="field_group">
                        <label for="new_pass">New password</label>
                        <input type="password" id="new_pass" class="elem_change_pass" placeholder="Your new password">
                        <span class="warn_inline" id="warning_note_1"></span>
                    </div>
                </div>
            </div>

            <div class="accordion_item">
                <div class="accordion_header">
                    <span id="navi_address">▶</span>
                    <button class="button_elem_2" id="button_address_change">Update your address</button>
                </div>
                <div class="contain" id="contain_address">
                    <div class="field_group">
                        <label for="new_address">Address</label>
                        <input type="text" id="new_address" class="elem_change_pass" placeholder="Your address">
                        <span class="warn_inline" id="warning_address_note_1"></span>
                    </div>
                </div>
            </div>

            <div class="save_row">
                <button type="submit" id="privacy_save" class="button_save">💾 Save</button>
                <p class="note_warn">⚠️ Saving will auto <b>log you out</b> — you'll need to sign in again.</p>
            </div>
        </div>
        <div id="id_tag_feedback">
            <h2 class="section_title">Feedback</h2>
            <div class="section_divider"></div>
            <div class="field_group">
                <label for="">Do you have any issues to report or suggestions for us?</label>
                <textarea rows="10" placeholder="Type your report or suggestions" class="input_elem" style="height: 200px;width: auto;"></textarea>
            </div>
            <div class="save_row">
                <button type="submit" id="profile_save" class="button_save">📩 Send</button>
            </div>
        </div>
        <!-- LOG OUT -->
        <div id="id_tag_logout">
            <h2 class="section_title danger_text">Log out</h2>
            <div class="section_divider"></div>
            <div class="logout_row">
                <span>Log out your account</span>
                <button id="log_out" class="button_log_out_tag">🔓 Log out</button>
            </div>
        </div>

        <!-- DELETE ACCOUNT -->
        <div id="id_tag_dell_acc">
            <h2 class="section_title danger_text">Delete this account</h2>
            <div class="section_divider"></div>
            <p style="margin-top:16px;color:#666;">This action is permanent and cannot be undone.</p>
        </div>

    </main>
</div>

<script src="account.js"></script>
<script src="change_info.js"></script>
</body>
</html>
